<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摩托車保養紀錄</title>
</head>
<body style="margin:0;padding:0;">
<div id="app-root">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
#app-root{
  --paper:#F4F2EC; --surface:#FFFFFF; --ink:#16181D; --muted:#6B6E76;
  --line:#E5E2DA; --line2:#D8D4CA; --blue:#1B4FD0; --blue-soft:#EAF0FF;
  --green:#2E7D52; --amber:#B5781A; --red:#C0392B;
  font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink); background:var(--paper); display:block; width:100%;
  -webkit-font-smoothing:antialiased; box-sizing:border-box;
}
#app-root *{box-sizing:border-box;}
#app-root .mono{font-family:'Roboto Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
#app-root .wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px;}

#app-root .topbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:18px;}
#app-root .plate{font-family:'Roboto Mono',monospace;font-weight:700;font-size:15px;letter-spacing:1px;
  background:var(--ink);color:#F4F2EC;padding:4px 10px;border-radius:5px;cursor:pointer;}
#app-root .model{font-size:13px;color:var(--muted);}

#app-root .odo{background:var(--surface);border:1px solid var(--line2);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
#app-root .odo-label{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
#app-root .odo-read{display:flex;align-items:baseline;gap:8px;}
#app-root .odo-num{font-family:'Roboto Mono',monospace;font-weight:700;font-size:42px;line-height:1;letter-spacing:2px;
  background:#1b1d22;color:#f3f1ea;padding:8px 14px;border-radius:8px;font-variant-numeric:tabular-nums;}
#app-root .odo-unit{font-size:16px;color:var(--muted);font-weight:500;}
#app-root .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:22px;}
#app-root .stat{background:var(--surface);padding:12px 12px;}
#app-root .stat .k{font-size:11px;color:var(--muted);margin-bottom:3px;}
#app-root .stat .v{font-size:18px;font-weight:700;}
#app-root .stat .v small{font-size:12px;font-weight:400;color:var(--muted);}

#app-root h2{font-size:15px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
#app-root h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);}
#app-root .section{margin-bottom:26px;}

#app-root .gauges{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
#app-root .duebanner{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
#app-root .duebanner span{font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:20px;}
#app-root .db-due{background:#FBE9E7;color:var(--red);}
#app-root .db-soon{background:#FAF1DF;color:var(--amber);}
#app-root .sysgroup{margin-bottom:20px;}
#app-root .sysgroup:last-child{margin-bottom:0;}
#app-root .syshead{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:1.5px;margin:0 0 10px;display:flex;align-items:center;gap:9px;}
#app-root .sysbar{width:4px;height:15px;border-radius:2px;display:inline-block;}
#app-root .glast{font-size:10.5px;color:var(--muted);margin-top:5px;font-family:'Roboto Mono',monospace;}
#app-root .gauge{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;}
#app-root .gauge .gtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
#app-root .gauge .gname{font-size:14px;font-weight:500;}
#app-root .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
#app-root .b-ok{background:#E7F1EC;color:var(--green);}
#app-root .b-soon{background:#FaF1DF;color:var(--amber);}
#app-root .b-due{background:#FBE9E7;color:var(--red);}
#app-root .track{height:7px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:8px;}
#app-root .gmodel{font-size:11.5px;color:var(--muted);margin:-2px 0 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#app-root .gmodel b{font-weight:500;color:var(--ink);}
#app-root .spec{display:flex;flex-direction:column;}
#app-root .srow{display:grid;grid-template-columns:84px 1fr auto;align-items:baseline;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
#app-root .srow:last-child{border-bottom:none;}
#app-root .slabel{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;}
#app-root .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#app-root .smodel{font-size:13px;color:var(--ink);word-break:break-word;line-height:1.5;}
#app-root .smeta{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
#app-root .frec{display:flex;gap:13px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
#app-root .frec:last-child{border-bottom:none;}
#app-root .fkml{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:62px;
  background:var(--paper);border:1px solid var(--line2);border-radius:10px;padding:7px 4px;}
#app-root .fkml b{font-family:'Roboto Mono',monospace;font-size:19px;line-height:1;}
#app-root .fkml span{font-size:10px;color:var(--muted);margin-top:2px;}
#app-root .fkml.na b{color:var(--line2);font-size:15px;}
#app-root .fbody{flex:1;min-width:0;}
#app-root .fr1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
#app-root .fr1 .desc{font-size:13.5px;}
#app-root .ftotal{font-family:'Roboto Mono',monospace;font-weight:700;font-size:14px;white-space:nowrap;}
#app-root .fmeta2{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:11.5px;color:var(--muted);margin-top:4px;align-items:center;}
#app-root .fmeta2 .mono{color:var(--ink);}
#app-root .fmeta2 .acts{margin-left:auto;display:flex;gap:6px;}
#app-root .fmeta2 .ico{cursor:pointer;padding:2px 5px;border-radius:5px;}
#app-root .fmeta2 .ico:hover{background:var(--paper);color:var(--ink);}
#app-root .fill{height:100%;border-radius:6px;transition:width .4s;}
#app-root .gmeta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);}
#app-root .gmeta .km{font-family:'Roboto Mono',monospace;font-weight:500;color:var(--ink);}

#app-root .card{background:var(--surface);border:1px solid var(--line2);border-radius:14px;padding:16px;}
#app-root .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
#app-root label.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
#app-root input,#app-root select,#app-root textarea{width:100%;font-family:inherit;font-size:14px;color:var(--ink);
  background:var(--paper);border:1px solid var(--line2);border-radius:9px;padding:10px 11px;outline:none;}
#app-root input:focus,#app-root select:focus,#app-root textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
#app-root input.mono{font-family:'Roboto Mono',monospace;}
#app-root .btn{font-family:inherit;font-size:14px;font-weight:500;border-radius:9px;padding:10px 16px;cursor:pointer;
  border:1px solid var(--line2);background:var(--surface);color:var(--ink);transition:.12s;}
#app-root .btn:hover{background:var(--paper);}
#app-root .btn:active{transform:scale(.98);}
#app-root .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
#app-root .btn-primary:hover{background:#1740b0;}
#app-root .btn-row{display:flex;gap:8px;margin-top:6px;}

#app-root .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
#app-root .chip{font-size:12.5px;padding:5px 11px;border-radius:20px;border:1px solid var(--line2);background:var(--surface);
  color:var(--muted);cursor:pointer;transition:.12s;}
#app-root .chip:hover{border-color:var(--ink);color:var(--ink);}
#app-root .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
#app-root .search{margin-bottom:12px;}

#app-root .rec{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
#app-root .rec:last-child{border-bottom:none;}
#app-root .rec .tag{width:4px;border-radius:3px;flex-shrink:0;}
#app-root .rec .body{flex:1;min-width:0;}
#app-root .rec .r1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
#app-root .rec .rcat{font-size:13px;font-weight:700;}
#app-root .rec .rcost{font-family:'Roboto Mono',monospace;font-weight:700;font-size:14px;white-space:nowrap;}
#app-root .rec .rcost.none{color:var(--line2);font-weight:400;}
#app-root .rec .rcost.est{color:var(--muted);font-weight:400;font-family:'Roboto Mono',monospace;font-size:12.5px;}
#app-root .stat .v .estsub{font-size:11px;font-weight:400;color:var(--muted);margin-top:2px;}
#app-root .rec .ritem{font-size:13.5px;color:var(--ink);margin:3px 0 4px;word-break:break-word;}
#app-root .rec .rmeta{display:flex;gap:12px;font-size:11.5px;color:var(--muted);align-items:center;}
#app-root .rec .rmeta .mil{font-family:'Roboto Mono',monospace;}
#app-root .rec .acts{display:flex;gap:6px;margin-left:auto;}
#app-root .rec .ico{cursor:pointer;color:var(--muted);font-size:12px;padding:2px 5px;border-radius:5px;}
#app-root .rec .ico:hover{background:var(--paper);color:var(--ink);}
#app-root .rec .rnote{font-size:11.5px;color:var(--muted);margin-top:4px;font-style:italic;}

#app-root .costbars{display:flex;flex-direction:column;gap:7px;}
#app-root .cb{display:grid;grid-template-columns:64px 1fr 76px;align-items:center;gap:10px;font-size:12.5px;}
#app-root .cb .cbar{height:14px;border-radius:4px;}
#app-root .cb .cval{font-family:'Roboto Mono',monospace;text-align:right;color:var(--muted);}

#app-root .foot{display:flex;gap:8px;justify-content:space-between;margin-top:18px;flex-wrap:wrap;}
#app-root .note{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.6;}
#app-root .empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 0;}

/* Setup modal */
#setupOverlay{
  display:none;position:fixed;inset:0;background:rgba(22,24,29,0.7);z-index:200;
  align-items:center;justify-content:center;padding:16px;
}
#setupOverlay.open{display:flex;}
#setupBox{
  background:var(--surface);border-radius:18px;padding:28px 24px;width:100%;max-width:460px;
  box-shadow:0 8px 40px rgba(0,0,0,0.18);
}
#setupBox h2{font-size:18px;font-weight:700;margin:0 0 6px;}
#setupBox p{font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.6;}
#setupBox .setup-form .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
#setupBox .setup-divider{text-align:center;font-size:12px;color:var(--muted);margin:16px 0;position:relative;}
#setupBox .setup-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line);}
#setupBox .setup-divider span{background:var(--surface);padding:0 10px;position:relative;}
#setupBox .demo-btn{width:100%;text-align:center;justify-content:center;display:flex;}

/* Vehicle edit modal */
#vehicleOverlay{
  display:none;position:fixed;inset:0;background:rgba(22,24,29,0.6);z-index:200;
  align-items:center;justify-content:center;padding:16px;
}
#vehicleOverlay.open{display:flex;}
#vehicleBox{background:var(--surface);border-radius:18px;padding:24px;width:100%;max-width:420px;}
#vehicleBox h2{font-size:16px;font-weight:700;margin:0 0 16px;}

@media(max-width:560px){
  #app-root .stats{grid-template-columns:repeat(2,1fr);}
  #app-root .frow{grid-template-columns:1fr;}
  #app-root .odo-num{font-size:34px;}
  #app-root .srow{grid-template-columns:78px 1fr;}
  #app-root .smeta{grid-column:2;text-align:left;}
  #setupBox .setup-form .frow{grid-template-columns:1fr;}
}
</style>

<!-- Setup modal (first time) -->
<div id="setupOverlay">
  <div id="setupBox">
    <h2>🏍️ 建立你的保養紀錄</h2>
    <p>輸入你的車輛資訊，開始記錄保養歷史。資料存在這個瀏覽器，不會與其他人共用。</p>
    <div class="setup-form">
      <div style="margin-bottom:10px;"><label class="fl">車型名稱</label><input type="text" id="setupName" placeholder="例：勁戰五代 / R15 / Dink 125"></div>
      <div class="frow">
        <div><label class="fl">車牌號碼</label><input type="text" id="setupPlate" placeholder="例：ABC-1234" style="font-family:'Roboto Mono',monospace;"></div>
        <div><label class="fl">目前里程 (km)</label><input type="number" id="setupMileage" class="mono" placeholder="例：12500"></div>
      </div>
      <div style="margin-bottom:16px;"><label class="fl">車輛規格說明（可選）</label><input type="text" id="setupSpec" placeholder="例：125cc FI · 水冷 · 油箱 7.2L"></div>
      <button class="btn btn-primary" id="setupSaveBtn" style="width:100%;justify-content:center;display:flex;">開始使用</button>
    </div>
    <div class="setup-divider"><span>或者</span></div>
    <button class="btn demo-btn" id="setupDemoBtn">載入範例資料（勁戰三代）</button>
  </div>
</div>

<!-- Vehicle edit modal -->
<div id="vehicleOverlay">
  <div id="vehicleBox">
    <h2>編輯車輛資訊</h2>
    <div style="margin-bottom:10px;"><label class="fl">車型名稱</label><input type="text" id="veName"></div>
    <div class="frow">
      <div><label class="fl">車牌號碼</label><input type="text" id="vePlate" style="font-family:'Roboto Mono',monospace;"></div>
      <div><label class="fl">目前里程 (km)</label><input type="number" id="veMileage" class="mono"></div>
    </div>
    <div style="margin-bottom:16px;"><label class="fl">車輛規格說明（可選）</label><input type="text" id="veSpec"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="veSaveBtn">儲存</button>
      <button class="btn" id="veCancelBtn">取消</button>
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);">
      <button class="btn" id="veResetBtn" style="color:var(--red);border-color:#e8c9c4;width:100%;justify-content:center;display:flex;">清除所有資料並重設</button>
    </div>
  </div>
</div>

<div class="wrap" id="mainApp" style="display:none;">
  <div class="topbar">
    <div>
      <div style="font-size:18px;font-weight:700;" id="appTitle">保養紀錄</div>
      <div class="model" id="appSpec"></div>
    </div>
    <div class="plate" id="appPlate" title="點擊編輯車輛資訊">—</div>
  </div>

  <div class="odo">
    <div class="odo-label">目前里程</div>
    <div class="odo-read"><span class="odo-num mono" id="odoNum">—</span><span class="odo-unit">km</span></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="section">
    <h2><span class="dot"></span>保養提醒</h2>
    <div id="reminders"></div>
    <div class="note">依車輛系統分類，各項目以「最近一次更換里程」與建議週期估算損耗。沒紀錄的項目，之後更換時在內容含對應名稱（如「前來令片」）即可自動追蹤。</div>
  </div>

  <div class="section">
    <h2><span class="dot"></span>目前配置</h2>
    <div class="card"><div class="spec" id="spec"></div></div>
    <div class="note">每個項目顯示最近一次更換的型號／規格，就是車上現在裝的東西。</div>
  </div>

  <div class="section">
    <h2><span class="dot"></span>新增紀錄</h2>
    <div class="card">
      <input type="hidden" id="editId" value="">
      <div class="frow">
        <div><label class="fl">日期</label><input type="date" id="fDate"></div>
        <div><label class="fl">里程 (km)</label><input type="number" class="mono" id="fMileage" placeholder="例 64244"></div>
      </div>
      <div class="frow">
        <div><label class="fl">項目分類</label><select id="fCat"></select></div>
        <div><label class="fl">金額 (NT$，可留空)</label><input type="number" class="mono" id="fCost" placeholder="例 145"></div>
      </div>
      <div style="margin-bottom:10px;"><label class="fl">更換內容</label><input type="text" id="fItem" placeholder="例 Repsol 10W-50 900cc"></div>
      <div style="margin-bottom:6px;"><label class="fl">備註</label><input type="text" id="fNote" placeholder="店家、規格、狀況…"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveBtn">儲存紀錄</button>
        <button class="btn" id="cancelBtn" style="display:none;">取消編輯</button>
      </div>
    </div>
  </div>

  <div class="section">
    <h2><span class="dot"></span>花費分布</h2>
    <div class="card"><div class="costbars" id="costbars"></div></div>
  </div>

  <div class="section">
    <h2><span class="dot"></span>油耗 / 加油</h2>
    <div class="stats" id="fuelStats" style="margin-bottom:14px;"></div>
    <div class="card">
      <input type="hidden" id="fuEditId" value="">
      <div class="frow">
        <div><label class="fl">日期</label><input type="date" id="fuDate"></div>
        <div><label class="fl">加油時里程 (可空)</label><input type="number" class="mono" id="fuMileage" placeholder="自動算距離用"></div>
      </div>
      <div class="frow">
        <div><label class="fl">公升數 (L)</label><input type="number" step="0.01" class="mono" id="fuLiters" placeholder="例 6.06"></div>
        <div><label class="fl">每公升單價 (NT$)</label><input type="number" step="0.1" class="mono" id="fuPrice" placeholder="例 32.4"></div>
      </div>
      <div class="frow">
        <div><label class="fl">折抵金額 (NT$，可空)</label><input type="number" step="0.1" class="mono" id="fuDiscount" placeholder="例 5"></div>
        <div><label class="fl">行駛距離 (km，里程可算時可空)</label><input type="number" class="mono" id="fuDistance" placeholder="例 170"></div>
      </div>
      <div style="margin-bottom:6px;"><label class="fl">備註</label><input type="text" id="fuNote" placeholder="油種、加油站…"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="fuSaveBtn">儲存加油</button>
        <button class="btn" id="fuCancelBtn" style="display:none;">取消編輯</button>
      </div>
    </div>
    <div class="card" style="padding:4px 16px;margin-top:12px;"><div id="fuelList"></div></div>
    <div class="note">油耗 = 行駛距離 ÷ 加油公升數。若每次都填加油時里程，距離會自動以「這次里程 − 上次里程」計算；否則用手動距離。</div>
  </div>

  <div class="section">
    <h2><span class="dot"></span>所有紀錄 <span id="recCount" style="font-weight:400;color:var(--muted);font-size:13px;"></span></h2>
    <input type="text" class="search" id="search" placeholder="搜尋內容 / 備註…">
    <div class="filters" id="filters"></div>
    <div class="card" style="padding:4px 16px;"><div id="recList"></div></div>
    <div class="foot">
      <button class="btn" id="exportBtn">匯出 CSV</button>
    </div>
  </div>
</div>

<script>
(function(){
  var storage = {
    get: function(key){ return Promise.resolve({value: localStorage.getItem('scooter_'+key)}); },
    set: function(key, val){ try{ localStorage.setItem('scooter_'+key, val); }catch(e){} return Promise.resolve(); },
    del: function(key){ localStorage.removeItem('scooter_'+key); }
  };

  var CATS = {
    oil:{label:'機油',color:'#1B4FD0',track:1500},
    gear:{label:'齒輪油',color:'#7C3AED',track:4000},
    air:{label:'空濾',color:'#0E7490',track:6000},
    plug:{label:'火星塞',color:'#B5781A',track:10000},
    trans:{label:'傳動',color:'#BE5A1E',track:10000},
    tire_r:{label:'後輪胎',color:'#16181D',track:15000},
    tire_f:{label:'前輪胎',color:'#0F766E',track:12000},
    fork:{label:'前叉油',color:'#2E7D52',track:8000},
    brake:{label:'煞車',color:'#C0392B',track:null},
    engine:{label:'引擎',color:'#9A1F1F',track:null},

  function fuelSorted(){

  function fuelTotal(f){ return (f.liters||0)*(f.price||0)-(f.discount||0); }
  function fuelDistance(f,asc,idx){
    if(f.mileage!=null){ for(var i=idx-1;i>=0;i--){ if(asc[i].mileage!=null) return f.mileage-asc[i].mileage; } }
    return f.distance!=null?f.distance:null;
  }
  function fuelKmL(f,asc,idx){ var d=fuelDistance(f,asc,idx); return (d!=null&&f.liters)?d/f.liters:null; }

  function monthsBetween(dateStr){ if(!dateStr)return null; var d=new Date(dateStr); if(isNaN(d))return null; var now=new Date(); var m=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth()); return m<0?0:m; }

  function resolveItem(item){
    if(item.timeBased){
      var blast=item.cat?latestOf(item.cat):latestMatch(item.re);
      var blabel=item.cat?CATS[item.cat].label:item.label;
      var bcolor=item.color||(item.cat?CATS[item.cat].color:'#5B6470');
      var ms=blast?monthsBetween(blast.date):null;
      var volt=null;
      if(blast){var vm=((blast.note||'')+' '+(blast.item||'')).match(/(\d{1,2}(?:\.\d)?)\s*[vV]/);if(vm)volt=parseFloat(vm[1]);}
      return{label:blabel,color:bcolor,timeBased:true,trackMonths:item.trackMonths,last:blast,model:blast?cleanModel(blast.item):'',monthsSince:ms,ratio:ms==null?null:ms/item.trackMonths,volt:volt};
    }
    var label,color,track,last,model;
    if(item.cat){
      var c=CATS[item.cat]; if(!c.track)return null;
      label=c.label;color=c.color;track=c.track;last=lastOf(item.cat);
      var l2=latestOf(item.cat);model=l2?cleanModel(l2.item):'';
    }else{
      label=item.label;color=item.color;track=item.track;last=lastMatch(item.re);

    }

      left=r.since==null?'尚無紀錄':'已跑 '+fmtNum(r.since)+' km';right='週期 '+fmtNum(r.track);
      lastInfo=r.last?'上次 '+fmtNum(r.last.mileage)+' km'+(r.last.date?'（'+r.last.date.slice(0,7)+'）':''):'';
    }
    return'<div class="gauge"><div class="gtop"><span class="gname">'+r.label+'</span><span class="badge '+cls+'">'+txt+'</span></div>'
      +'<div class="gmodel" title="'+esc(r.model)+'">'+(r.model?'目前 <b>'+esc(r.model)+'</b>':'<span style="opacity:.6">未記錄型號</span>')+'</div>'
      +'<div class="track"><div class="fill" style="width:'+pct+'%;background:'+bg+';"></div></div>'
      +'<div class="gmeta"><span class="km">'+left+'</span><span>'+right+'</span></div>'
      +(lastInfo?'<div class="glast">'+lastInfo+'</div>':'')+'</div>';
  }
  function renderReminders(){
    var due=0,soon=0;
    SYSTEMS.forEach(function(s){s.items.forEach(function(it){var r=resolveItem(it);if(!r||r.ratio==null)return;if(r.ratio>=1)due++;else if(r.ratio>=0.8)soon++;});});
    var html='';
    if(due>0||soon>0) html+='<div class="duebanner">'+(due>0?'<span class="db-due">'+due+' 項該換</span>':'')+(soon>0?'<span class="db-soon">'+soon+' 項快到</span>':'')+'</div>';
    SYSTEMS.forEach(function(sys){
      var cards=sys.items.map(gaugeCard).join('');
      html+='<div class="sysgroup"><div class="syshead"><span class="sysbar" style="background:'+sys.color+';"></span>'+sys.name+'</div><div class="gauges">'+cards+'</div></div>';
    });
    document.getElementById('reminders').innerHTML=html;
  }

  function renderStats(){
    var cur=currentMileage(),mn=minMileage(),span=cur-mn;
    document.getElementById('odoNum').textContent=fmtNum(cur);
    var total=0,n=0,est=0;
    state.records.forEach(function(r){if(typeof r.cost==='number')total+=r.cost;else{var e=estimateCost(r);if(e)est+=e.cost;}n++;});
    var perKm=span>0?total/span:0;
    var dates=state.records.map(function(r){return r.date;}).filter(Boolean).sort();
    var years=dates.length>1?((new Date(dates[dates.length-1])-new Date(dates[0]))/(365.25*864e5)):0;
    var html='';
    html+='<div class="stat"><div class="k">已記錄花費</div><div class="v">'+fmtMoney(total)+(est>0?'<div class="estsub">含估算 ~'+fmtMoney(total+est)+'</div>':'')+'</div></div>';
    html+='<div class="stat"><div class="k">每公里成本</div><div class="v">'+perKm.toFixed(2)+'<small> /km</small></div></div>';
    html+='<div class="stat"><div class="k">紀錄筆數</div><div class="v">'+n+'<small> 筆</small></div></div>';
    html+='<div class="stat"><div class="k">記錄期間</div><div class="v">'+years.toFixed(1)+'<small> 年</small></div></div>';
    document.getElementById('stats').innerHTML=html;
  }

  function renderSpec(){
    var html='';
    Object.keys(CATS).forEach(function(cat){
      if(cat==='brake'){
        [{label:'前卡鉗',re:/卡鉗/},{label:'前碟盤',re:/碟盤/},{label:'前來令片',re:/前.*來令|來令.*前/},{label:'煞車油',re:/煞車油/},{label:'後煞車（鼓煞）',re:/後.*煞車皮|後.*來令|後煞車/}].forEach(function(bp){
          var m=lastMatch(bp.re);if(!m)return;
          html+='<div class="srow"><span class="slabel"><span class="sdot" style="background:#C0392B;"></span>'+bp.label+'</span><span class="smodel">'+esc(cleanModel(m.item))+'</span><span class="smeta">'+esc(m.mileage?fmtNum(m.mileage)+' km':(m.date||''))+'</span></div>';
        });return;
      }
      var r=latestOf(cat);if(!r)return;
      var c=CATS[cat];
      html+='<div class="srow"><span class="slabel"><span class="sdot" style="background:'+c.color+';"></span>'+c.label+'</span><span class="smodel">'+esc(cleanModel(r.item)||'—')+'</span><span class="smeta">'+esc(r.mileage?fmtNum(r.mileage)+' km':(r.date||''))+'</span></div>';
    });
    document.getElementById('spec').innerHTML=html||'<div class="empty">尚無資料</div>';
  }

  function renderCostBars(){
    var sums={};
    state.records.forEach(function(r){if(typeof r.cost==='number')sums[r.cat]=(sums[r.cat]||0)+r.cost;});
    var arr=Object.keys(sums).map(function(k){return{cat:k,v:sums[k]};}).sort(function(a,b){return b.v-a.v;});
    var max=arr.length?arr[0].v:1,html='';
    arr.forEach(function(o){ html+='<div class="cb"><span>'+CATS[o.cat].label+'</span><span class="cbar" style="width:'+(o.v/max*100)+'%;background:'+CATS[o.cat].color+';"></span><span class="cval">'+fmtMoney(o.v)+'</span></div>'; });
    document.getElementById('costbars').innerHTML=html||'<div class="empty">尚無花費資料</div>';
  }

  function estimateCost(rec){
    if(typeof rec.cost==='number')return null;
    var earlier=state.records.filter(function(r){return r!==rec&&r.cat===rec.cat&&typeof r.cost==='number'&&(r.date||'')<(rec.date||'');});
    if(!earlier.length)return null;
    earlier.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    var toks=(rec.item||'').toLowerCase().match(/[a-z]{3,}/g)||[];
    var branded=earlier.filter(function(r){var rt=(r.item||'').toLowerCase().match(/[a-z]{3,}/g)||[];return toks.some(function(t){return rt.indexOf(t)>=0;});});
    var pick=branded.length?branded[0]:earlier[0];
    return{cost:pick.cost,from:pick};
  }

  function renderFilters(){
    var counts={all:state.records.length};
    state.records.forEach(function(r){counts[r.cat]=(counts[r.cat]||0)+1;});
    var html='<span class="chip'+(state.filter==='all'?' on':'')+'" data-f="all">全部 '+counts.all+'</span>';
    Object.keys(CATS).forEach(function(k){if(counts[k])html+='<span class="chip'+(state.filter===k?' on':'')+'" data-f="'+k+'">'+CATS[k].label+' '+counts[k]+'</span>';});
    var fl=document.getElementById('filters');fl.innerHTML=html;
    Array.prototype.forEach.call(fl.querySelectorAll('.chip'),function(ch){ch.onclick=function(){state.filter=ch.getAttribute('data-f');renderFilters();renderList();};});
  }

  function renderList(){
    var rows=state.records.slice().sort(function(a,b){var d=(b.date||'').localeCompare(a.date||'');if(d!==0)return d;return(b.mileage||0)-(a.mileage||0);});
    if(state.filter!=='all')rows=rows.filter(function(r){return r.cat===state.filter;});
    if(state.search){var q=state.search.toLowerCase();rows=rows.filter(function(r){return(r.item||'').toLowerCase().indexOf(q)>=0||(r.note||'').toLowerCase().indexOf(q)>=0;});}
    document.getElementById('recCount').textContent='· '+rows.length+' 筆';
    if(!rows.length){document.getElementById('recList').innerHTML='<div class="empty">沒有符合的紀錄</div>';return;}
    var html='';
    rows.forEach(function(r){
      var c=CATS[r.cat]||CATS.mod,cost;
      if(typeof r.cost==='number')cost='<span class="rcost">'+fmtMoney(r.cost)+'</span>';
      else{var est=estimateCost(r);cost=est?'<span class="rcost est" title="依先前同類紀錄估算">~'+fmtMoney(est.cost)+' 估</span>':'<span class="rcost none">—</span>';}
      html+='<div class="rec"><div class="tag" style="background:'+c.color+';"></div><div class="body">';
      html+='<div class="r1"><span class="rcat" style="color:'+c.color+';">'+c.label+'</span>'+cost+'</div>';
      html+='<div class="ritem">'+esc(r.item||'')+'</div>';
      html+='<div class="rmeta"><span>'+(r.date||'—')+'</span><span class="mil">'+(r.mileage?fmtNum(r.mileage)+' km':'里程未記')+'</span><span class="acts"><span class="ico" data-edit="'+r.id+'">編輯</span><span class="ico" data-del="'+r.id+'">刪除</span></span></div>';
      if(r.note)html+='<div class="rnote">'+esc(r.note)+'</div>';
      html+='</div></div>';
    });
    var list=document.getElementById('recList');list.innerHTML=html;
    Array.prototype.forEach.call(list.querySelectorAll('[data-edit]'),function(el){el.onclick=function(){startEdit(el.getAttribute('data-edit'));};});
    Array.prototype.forEach.call(list.querySelectorAll('[data-del]'),function(el){el.onclick=function(){delRec(el.getAttribute('data-del'));};});
  }

  function renderAll(){renderStats();renderReminders();renderSpec();renderCostBars();renderFuel();renderFilters();renderList();}

  function fillCatSelect(){
    document.getElementById('fCat').innerHTML=Object.keys(CATS).map(function(k){return'<option value="'+k+'">'+CATS[k].label+'</option>';}).join('');
  }
  function startEdit(id){
    var r=state.records.filter(function(x){return x.id===id;})[0];if(!r)return;
    document.getElementById('editId').value=id;
    document.getElementById('fDate').value=r.date||'';
    document.getElementById('fMileage').value=r.mileage!=null?r.mileage:'';
    document.getElementById('fCat').value=r.cat;
    document.getElementById('fCost').value=typeof r.cost==='number'?r.cost:'';
    document.getElementById('fItem').value=r.item||'';
    document.getElementById('fNote').value=r.note||'';
    document.getElementById('saveBtn').textContent='更新紀錄';
    document.getElementById('cancelBtn').style.display='inline-block';
    document.getElementById('mainApp').scrollIntoView({behavior:'smooth',block:'start'});
  }
  function resetForm(){
    document.getElementById('editId').value='';
    ['fDate','fMileage','fCost','fItem','fNote'].forEach(function(i){document.getElementById(i).value='';});
    document.getElementById('saveBtn').textContent='儲存紀錄';document.getElementById('cancelBtn').style.display='none';
  }
  async function saveRec(){
    var date=document.getElementById('fDate').value,mileage=document.getElementById('fMileage').value,
        cost=document.getElementById('fCost').value,item=document.getElementById('fItem').value.trim();
    if(!date&&!item)return;
    var rec={date:date||'',mileage:mileage===''?null:parseInt(mileage,10),cat:document.getElementById('fCat').value,
      cost:cost===''?null:parseFloat(cost),item:item,note:document.getElementById('fNote').value.trim()};
    var id=document.getElementById('editId').value;
    if(id){state.records=state.records.map(function(r){return r.id===id?Object.assign({},r,rec):r;});}
    else{rec.id='u'+Date.now();state.records.push(rec);}
    await save();resetForm();renderAll();
  }
  async function delRec(id){state.records=state.records.filter(function(r){return r.id!==id;});await save();renderAll();}

  function exportCSV(){
    var head=['日期','里程','分類','更換內容','金額','備註'],lines=[head.join(',')];
    state.records.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(r){
      var row=[r.date||'',r.mileage!=null?r.mileage:'',CATS[r.cat]?CATS[r.cat].label:r.cat,
        '"'+(r.item||'').replace(/"/g,'""')+'"',typeof r.cost==='number'?r.cost:'','"'+(r.note||'').replace(/"/g,'""')+'"'];
      lines.push(row.join(','));
    });
    var blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8;'}),url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=(state.vehicle.name||'摩托車')+'_保養紀錄.csv';a.click();URL.revokeObjectURL(url);
  }

  fillCatSelect();
  document.getElementById('saveBtn').onclick=saveRec;
  document.getElementById('cancelBtn').onclick=resetForm;
  document.getElementById('exportBtn').onclick=exportCSV;
  document.getElementById('search').oninput=function(e){state.search=e.target.value;renderList();};
  document.getElementById('fuSaveBtn').onclick=saveFuelEntry;
  document.getElementById('fuCancelBtn').onclick=resetFuelForm;
  load();
})();
</script>
</div>
</body>
</html>
